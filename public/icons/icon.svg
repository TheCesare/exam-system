<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
  </defs>
  <!-- Full background (safe for maskable - fills entire icon) -->
  <rect width="512" height="512" rx="0" fill="url(#bg)"/>
  <!-- Clipboard body - centered with padding for maskable safe zone -->
  <rect x="136" y="110" width="240" height="290" rx="14" fill="#1a2235" stroke="#1e3a5f" stroke-width="3"/>
  <!-- Clipboard clip -->
  <rect x="204" y="92" width="104" height="40" rx="10" fill="#1e3a5f"/>
  <rect x="220" y="98" width="72" height="28" rx="6" fill="#0a0e1a"/>
  <!-- Lines on clipboard -->
  <line x1="166" y1="180" x2="346" y2="180" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="166" y1="218" x2="310" y2="218" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="166" y1="248" x2="330" y2="248" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="166" y1="278" x2="290" y2="278" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Checkmark -->
  <circle cx="256" cy="350" r="36" fill="none" stroke="#00ff9d" stroke-width="3.5" opacity="0.9"/>
  <polyline points="238,350 250,364 276,336" fill="none" stroke="#00ff9d" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Status dot -->
  <circle cx="380" cy="128" r="8" fill="#00d4ff" opacity="0.9"/>
  <circle cx="380" cy="128" r="14" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
</svg>